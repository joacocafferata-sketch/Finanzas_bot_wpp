<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Finanzas</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f13; --bg2: #1a1a22; --bg3: #22222e;
      --border: rgba(255,255,255,0.08); --text: #f0f0f0; --text2: #888;
      --green: #22c997; --red: #ff6b6b; --blue: #4f9cf9; --purple: #9b72ff;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .app { max-width: 960px; margin: 0 auto; padding: 2rem 1.25rem; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
    .header-left h1 { font-size: 24px; font-weight: 600; letter-spacing: -0.5px; }
    .header-left .sub { font-size: 12px; color: var(--text2); margin-top: 3px; }
    .refresh-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); padding: 8px 14px; border-radius: 10px; cursor: pointer; font-size: 13px; transition: all .15s; }
    .refresh-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
    .tabs { display: flex; gap: 4px; margin-bottom: 1.5rem; background: var(--bg2); padding: 4px; border-radius: 12px; width: fit-content; flex-wrap: wrap; }
    .tab { padding: 8px 16px; border-radius: 9px; border: none; background: transparent; cursor: pointer; font-size: 13px; color: var(--text2); transition: all .15s; }
    .tab.active { background: var(--bg3); color: var(--text); font-weight: 500; }
    .section { display: none; }
    .section.active { display: block; }
    .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
    .metric { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 1.1rem 1.25rem; }
    .metric .m-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
    .metric .m-value { font-size: 20px; font-weight: 600; }
    .metric .m-value.pos { color: var(--green); }
    .metric .m-value.neg { color: var(--red); }
    .metric .m-value.neu { color: var(--blue); }
    .metric .m-value.inv { color: var(--purple); }
    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 1.25rem; margin-bottom: 1rem; }
    .card-title { font-size: 11px; font-weight: 500; color: var(--text2); margin-bottom: 1rem; text-transform: uppercase; letter-spacing: .06em; }
    .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    .chart-wrap { position: relative; width: 100%; height: 220px; }
    .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text2); }
    .legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
    .txn-list { display: flex; flex-direction: column; gap: 5px; max-height: 500px; overflow-y: auto; }
    .txn-item { display: flex; align-items: center; gap: 14px; padding: 11px 14px; background: var(--bg3); border-radius: 12px; font-size: 13px; border: 1px solid transparent; transition: border .15s; }
    .txn-item:hover { border-color: var(--border); }
    .txn-emoji { font-size: 26px; line-height: 1; flex-shrink: 0; width: 32px; text-align: center; }
    .txn-info { flex: 1; min-width: 0; }
    .txn-desc { font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .txn-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
    .txn-amount { font-weight: 600; font-size: 14px; white-space: nowrap; }
    .txn-amount.income { color: var(--green); }
    .txn-amount.expense { color: var(--red); }
    .txn-edit-btn { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 15px; padding: 4px 6px; border-radius: 6px; transition: all .15s; flex-shrink: 0; }
    .txn-edit-btn:hover { background: var(--bg2); color: var(--text); }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 18px; padding: 1.5rem; width: 100%; max-width: 420px; }
    .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 1.25rem; }
    .modal-field { margin-bottom: 12px; }
    .modal-field label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 5px; }
    .modal-field input, .modal-field select { width: 100%; padding: 9px 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg3); color: var(--text); font-size: 13px; }
    .modal-field input:focus, .modal-field select:focus { outline: none; border-color: var(--blue); }
    .modal-actions { display: flex; gap: 8px; margin-top: 1.25rem; flex-wrap: wrap; }
    .btn { padding: 9px 18px; border-radius: 10px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: all .15s; }
    .btn-primary { background: var(--blue); color: #fff; flex: 1; }
    .btn-primary:hover { opacity: .9; }
    .btn-danger { background: rgba(255,107,107,.15); color: var(--red); border: 1px solid rgba(255,107,107,.3); }
    .btn-danger:hover { background: rgba(255,107,107,.25); }
    .btn-cancel { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
    .btn-cancel:hover { color: var(--text); }
    .inv-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 1rem; }
    .inv-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 14px; padding: 1.1rem; }
    .inv-card .inv-name { font-size: 12px; color: var(--text2); margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; }
    .inv-card .inv-amount { font-size: 22px; font-weight: 600; color: var(--purple); }
    .inv-card .inv-date { font-size: 11px; color: var(--text2); margin-top: 4px; }
    .inv-card .inv-edit { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 14px; }
    .inv-change { font-size: 12px; margin-top: 4px; }
    .inv-change.pos { color: var(--green); }
    .inv-change.neg { color: var(--red); }
    .add-inv-btn { width: 100%; padding: 12px; border-radius: 14px; border: 1px dashed var(--border); background: transparent; color: var(--text2); cursor: pointer; font-size: 13px; transition: all .15s; margin-bottom: 1rem; }
    .add-inv-btn:hover { border-color: var(--purple); color: var(--purple); }
    .empty { text-align: center; color: var(--text2); font-size: 13px; padding: 2.5rem 0; }
    .saving { opacity: .6; pointer-events: none; }
    @media (max-width: 600px) {
      .charts-grid { grid-template-columns: 1fr; }
      .metrics { grid-template-columns: 1fr 1fr; }
      .tabs { width: 100%; }
      .tab { flex: 1; text-align: center; font-size: 12px; padding: 8px 8px; }
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-left">
      <h1>💰 Mis finanzas</h1>
      <div class="sub" id="last-update">Cargando...</div>
    </div>
    <button class="refresh-btn" onclick="cargarDatos()">↻ Actualizar</button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('resumen')">Resumen</button>
    <button class="tab" onclick="showTab('movimientos')">Movimientos</button>
    <button class="tab" onclick="showTab('inversiones')">Inversiones</button>
  </div>

  <div id="tab-resumen" class="section active">
    <div class="metrics" id="metrics-summary"></div>
    <div class="charts-grid">
      <div class="card">
        <div class="card-title">Gastos por categoría</div>
        <div class="chart-wrap"><canvas id="chartPie"></canvas></div>
        <div class="legend" id="legend-pie"></div>
      </div>
      <div class="card">
        <div class="card-title">Ingresos vs gastos</div>
        <div class="chart-wrap"><canvas id="chartBar"></canvas></div>
        <div class="legend" style="margin-top:8px;">
          <span class="legend-item"><span class="legend-dot" style="background:#22c997"></span>Ingresos</span>
          <span class="legend-item"><span class="legend-dot" style="background:#ff6b6b"></span>Gastos</span>
        </div>
      </div>
    </div>
  </div>

  <div id="tab-movimientos" class="section">
    <div class="card">
      <div class="card-title">Todos los movimientos</div>
      <div class="txn-list" id="txn-list"><div class="empty">Cargando...</div></div>
    </div>
  </div>

  <div id="tab-inversiones" class="section">
    <div class="metrics" id="inv-metrics"></div>
    <button class="add-inv-btn" onclick="abrirModalInversion()">+ Agregar inversión</button>
    <div class="inv-grid" id="inv-grid"></div>
    <div class="card" style="margin-top:1rem;">
      <div class="card-title">Historial de actualizaciones</div>
      <div id="inv-history" class="txn-list"></div>
    </div>
  </div>
</div>

<!-- MODAL EDITAR MOVIMIENTO -->
<div class="modal-overlay" id="modal-edit">
  <div class="modal">
    <h3>✏️ Editar movimiento</h3>
    <input type="hidden" id="edit-id">
    <div class="modal-field"><label>Descripción</label><input type="text" id="edit-desc"></div>
    <div class="modal-field"><label>Monto</label><input type="number" id="edit-monto"></div>
    <div class="modal-field"><label>Tipo</label>
      <select id="edit-tipo">
        <option value="ingreso">Ingreso</option>
        <option value="gasto">Gasto</option>
      </select>
    </div>
    <div class="modal-field"><label>Categoría</label>
      <select id="edit-cat">
        <option>Sueldo</option><option>Freelance</option>
        <option>Vivienda</option><option>Alimentacion</option><option>Transporte</option>
        <option>Salud</option><option>Entretenimiento</option><option>Educacion</option>
        <option>Ropa</option><option>Cuba</option><option>Otros</option>
      </select>
    </div>
    <div class="modal-field"><label>Fecha</label><input type="date" id="edit-fecha"></div>
    <div class="modal-actions">
      <button class="btn btn-danger" onclick="eliminarMovimiento()">🗑 Eliminar</button>
      <button class="btn btn-cancel" onclick="cerrarModal('modal-edit')">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarEdicion()">Guardar</button>
    </div>
  </div>
</div>

<!-- MODAL INVERSIÓN -->
<div class="modal-overlay" id="modal-inv">
  <div class="modal">
    <h3 id="modal-inv-title">📈 Nueva inversión</h3>
    <input type="hidden" id="inv-edit-id">
    <div class="modal-field"><label>Nombre</label><input type="text" id="inv-nombre" placeholder="Ej: Balanz FCI, Acciones GGAL..."></div>
    <div class="modal-field"><label>Monto actual</label><input type="number" id="inv-monto" placeholder="0"></div>
    <div class="modal-field"><label>Moneda</label>
      <select id="inv-moneda">
        <option value="ARS">Pesos (ARS)</option>
        <option value="USD">Dólares (USD)</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="cerrarModal('modal-inv')">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarInversion()">Guardar</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
  const SHEETDB_URL = "https://sheetdb.io/api/v1/llt3e0k07aekc";

  const catEmoji = {
    'Alimentacion':'🍔','Vivienda':'🏠','Transporte':'🚗','Salud':'💊',
    'Entretenimiento':'🎮','Educacion':'📚','Ropa':'👟','Sueldo':'💼',
    'Freelance':'💻','Cuba':'✈️','Otros':'📦'
  };
  const catColors = {
    'Vivienda':'#4f9cf9','Alimentacion':'#22c997','Transporte':'#ffc857',
    'Salud':'#ff6b9d','Entretenimiento':'#9b72ff','Educacion':'#5dcaa5',
    'Ropa':'#ff6b6b','Sueldo':'#22c997','Freelance':'#4f9cf9',
    'Cuba':'#ff9f43','Otros':'#666'
  };

  const fmt = (n, moneda) => (moneda === 'USD' ? 'U$D ' : '$') + Math.round(n).toLocaleString('es-AR');
  let allData = [];
  let editingId = null;
  let pieChart, barChart;

  function getInversiones() { try { return JSON.parse(localStorage.getItem('inversiones') || '[]'); } catch { return []; } }
  function saveInversiones(inv) { localStorage.setItem('inversiones', JSON.stringify(inv)); }

  async function cargarDatos() {
    document.getElementById('last-update').textContent = 'Actualizando...';
    try {
      const res = await fetch(SHEETDB_URL);
      const data = await res.json();
      allData = data.map(row => ({
        id: row.id || '',
        fecha: row.fecha || '',
        descripcion: row.descripcion || '',
        monto: parseFloat(row.monto) || 0,
        tipo: row.tipo || '',
        categoria: row.categoria || 'Otros'
      })).filter(r => r.monto > 0);
      document.getElementById('last-update').textContent = 'Actualizado: ' + new Date().toLocaleTimeString('es-AR');
      renderResumen();
      renderMovimientos();
      renderInversiones();
    } catch(e) {
      document.getElementById('last-update').textContent = 'Error al cargar datos';
    }
  }

  function renderResumen() {
    const ingresos = allData.filter(r => r.tipo==='ingreso').reduce((a,r)=>a+r.monto,0);
    const gastos = allData.filter(r => r.tipo==='gasto').reduce((a,r)=>a+r.monto,0);
    const balance = ingresos - gastos;
    const invTotal = getInversiones().filter(i=>i.moneda==='ARS').reduce((a,i)=>a+i.monto,0);

    document.getElementById('metrics-summary').innerHTML = `
      <div class="metric"><div class="m-label">Ingresos</div><div class="m-value pos">${fmt(ingresos)}</div></div>
      <div class="metric"><div class="m-label">Gastos</div><div class="m-value neg">${fmt(gastos)}</div></div>
      <div class="metric"><div class="m-label">Balance</div><div class="m-value ${balance>=0?'pos':'neg'}">${fmt(balance)}</div></div>
      <div class="metric"><div class="m-label">Inversiones</div><div class="m-value inv">${fmt(invTotal)}</div></div>
    `;

    const byCat = {};
    allData.filter(r=>r.tipo==='gasto').forEach(r=>{ byCat[r.categoria]=(byCat[r.categoria]||0)+r.monto; });
    const cats = Object.keys(byCat);
    const colors = cats.map(c=>catColors[c]||'#666');

    if (pieChart) pieChart.destroy();
    const pieCanvas = document.getElementById('chartPie');
    if (cats.length > 0) {
      pieChart = new Chart(pieCanvas, {
        type: 'doughnut',
        data: { labels: cats, datasets: [{ data: cats.map(c=>byCat[c]), backgroundColor: colors, borderWidth: 0 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, cutout: '65%' }
      });
      document.getElementById('legend-pie').innerHTML = cats.map((c,i) =>
        `<span class="legend-item"><span class="legend-dot" style="background:${colors[i]}"></span>${catEmoji[c]||''} ${c}</span>`
      ).join('');
    } else {
      pieCanvas.parentElement.innerHTML = '<div class="empty">Sin gastos aún</div>';
    }

    const byMonth = {};
    allData.forEach(r => {
      const mes = r.fecha.slice(0,7);
      if (!byMonth[mes]) byMonth[mes] = {ingreso:0,gasto:0};
      byMonth[mes][r.tipo] = (byMonth[mes][r.tipo]||0) + r.monto;
    });
    const meses = Object.keys(byMonth).sort();
    const nombresM = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    const mesLabels = meses.map(m => { const [y,mo]=m.split('-'); return nombresM[parseInt(mo)-1]+' '+y.slice(2); });

    if (barChart) barChart.destroy();
    if (meses.length > 0) {
      barChart = new Chart(document.getElementById('chartBar'), {
        type: 'bar',
        data: {
          labels: mesLabels,
          datasets: [
            { label: 'Ingresos', data: meses.map(m=>byMonth[m].ingreso||0), backgroundColor: '#22c997', borderRadius: 6 },
            { label: 'Gastos', data: meses.map(m=>byMonth[m].gasto||0), backgroundColor: '#ff6b6b', borderRadius: 6 }
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: '#888', autoSkip: false }, grid: { display: false } },
            y: { ticks: { color: '#888', callback: v => '$'+(v/1000).toFixed(0)+'k' }, grid: { color: 'rgba(255,255,255,0.05)' } }
          }
        }
      });
    }
  }

  function renderMovimientos() {
    const list = document.getElementById('txn-list');
    if (!allData.length) { list.innerHTML = '<div class="empty">No hay movimientos aún.</div>'; return; }
    const sorted = [...allData].sort((a,b) => b.fecha.localeCompare(a.fecha));
    list.innerHTML = sorted.map(r => `
      <div class="txn-item">
        <div class="txn-emoji">${catEmoji[r.categoria]||'📦'}</div>
        <div class="txn-info">
          <div class="txn-desc">${r.descripcion||'—'}</div>
          <div class="txn-meta">${r.categoria} · ${r.fecha}</div>
        </div>
        <span class="txn-amount ${r.tipo==='ingreso'?'income':'expense'}">
          ${r.tipo==='ingreso'?'+':'-'}${fmt(r.monto)}
        </span>
        <button class="txn-edit-btn" onclick="abrirEdicion('${r.id}')">✏️</button>
      </div>`).join('');
  }

  function abrirEdicion(id) {
    const r = allData.find(d => d.id === id);
    if (!r) return;
    editingId = id;
    document.getElementById('edit-id').value = id;
    document.getElementById('edit-desc').value = r.descripcion;
    document.getElementById('edit-monto').value = r.monto;
    document.getElementById('edit-tipo').value = r.tipo;
    document.getElementById('edit-cat').value = r.categoria;
    document.getElementById('edit-fecha').value = r.fecha;
    document.getElementById('modal-edit').classList.add('open');
  }

  async function guardarEdicion() {
    if (!editingId) return;
    const modal = document.querySelector('#modal-edit .modal');
    modal.classList.add('saving');

    const body = {
      data: {
        fecha: document.getElementById('edit-fecha').value,
        descripcion: document.getElementById('edit-desc').value,
        monto: document.getElementById('edit-monto').value,
        tipo: document.getElementById('edit-tipo').value,
        categoria: document.getElementById('edit-cat').value
      }
    };

    try {
      const res = await fetch(`${SHEETDB_URL}/id/${editingId}`, {
        method: 'PATCH',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body)
      });
      console.log('Edit response:', res.status, await res.text());
    } catch(e) {
      console.error('Edit error:', e);
    }

    modal.classList.remove('saving');
    cerrarModal('modal-edit');
    await cargarDatos();
  }

  async function eliminarMovimiento() {
    if (!editingId || !confirm('¿Eliminar este movimiento?')) return;
    try {
      await fetch(`${SHEETDB_URL}/id/${editingId}`, { method: 'DELETE' });
    } catch(e) {}
    cerrarModal('modal-edit');
    await cargarDatos();
  }

  function renderInversiones() {
    const inversiones = getInversiones();
    const totalARS = inversiones.filter(i=>i.moneda==='ARS').reduce((a,i)=>a+i.monto,0);
    const totalUSD = inversiones.filter(i=>i.moneda==='USD').reduce((a,i)=>a+i.monto,0);

    document.getElementById('inv-metrics').innerHTML = `
      <div class="metric"><div class="m-label">Total en ARS</div><div class="m-value inv">${fmt(totalARS,'ARS')}</div></div>
      <div class="metric"><div class="m-label">Total en USD</div><div class="m-value inv">${fmt(totalUSD,'USD')}</div></div>
      <div class="metric"><div class="m-label">Posiciones</div><div class="m-value neu">${inversiones.length}</div></div>
    `;

    const grid = document.getElementById('inv-grid');
    grid.innerHTML = !inversiones.length ? '<div class="empty">No hay inversiones cargadas aún.</div>'
      : inversiones.map((inv,i) => {
          const cambio = inv.historial && inv.historial.length > 1 ? inv.monto - inv.historial[inv.historial.length-2].monto : 0;
          const cambioStr = cambio !== 0 ? (cambio>=0?'+':'') + fmt(cambio,inv.moneda) : '';
          return `<div class="inv-card">
            <div class="inv-name"><span>📈 ${inv.nombre}</span><button class="inv-edit" onclick="abrirModalInversion(${i})">✏️</button></div>
            <div class="inv-amount">${fmt(inv.monto,inv.moneda)}</div>
            ${cambioStr ? `<div class="inv-change ${cambio>=0?'pos':'neg'}">${cambioStr} vs anterior</div>` : ''}
            <div class="inv-date">Actualizado: ${inv.fecha}</div>
          </div>`;
        }).join('');

    const allHistory = inversiones.flatMap(inv =>
      (inv.historial||[]).map(h=>({nombre:inv.nombre,moneda:inv.moneda,...h}))
    ).sort((a,b)=>b.fecha.localeCompare(a.fecha)).slice(0,20);

    document.getElementById('inv-history').innerHTML = !allHistory.length
      ? '<div class="empty">Sin historial aún.</div>'
      : allHistory.map(h=>`
        <div class="txn-item">
          <div class="txn-emoji">📈</div>
          <div class="txn-info"><div class="txn-desc">${h.nombre}</div><div class="txn-meta">${h.fecha}</div></div>
          <span class="txn-amount income">${fmt(h.monto,h.moneda)}</span>
        </div>`).join('');
  }

  function abrirModalInversion(index) {
    const inversiones = getInversiones();
    document.getElementById('modal-inv-title').textContent = index !== undefined ? '✏️ Editar inversión' : '📈 Nueva inversión';
    document.getElementById('inv-edit-id').value = index !== undefined ? index : '';
    if (index !== undefined) {
      const inv = inversiones[index];
      document.getElementById('inv-nombre').value = inv.nombre;
      document.getElementById('inv-monto').value = inv.monto;
      document.getElementById('inv-moneda').value = inv.moneda;
    } else {
      document.getElementById('inv-nombre').value = '';
      document.getElementById('inv-monto').value = '';
      document.getElementById('inv-moneda').value = 'ARS';
    }
    document.getElementById('modal-inv').classList.add('open');
  }

  function guardarInversion() {
    const inversiones = getInversiones();
    const idx = document.getElementById('inv-edit-id').value;
    const nombre = document.getElementById('inv-nombre').value.trim();
    const monto = parseFloat(document.getElementById('inv-monto').value) || 0;
    const moneda = document.getElementById('inv-moneda').value;
    const fecha = new Date().toLocaleDateString('es-AR');
    if (!nombre || !monto) return;
    if (idx !== '') {
      const inv = inversiones[parseInt(idx)];
      inv.monto = monto; inv.fecha = fecha;
      if (!inv.historial) inv.historial = [];
      inv.historial.push({monto,fecha});
    } else {
      inversiones.push({nombre,monto,moneda,fecha,historial:[{monto,fecha}]});
    }
    saveInversiones(inversiones);
    cerrarModal('modal-inv');
    renderInversiones();
  }

  function cerrarModal(id) { document.getElementById(id).classList.remove('open'); }

  function showTab(name) {
    document.querySelectorAll('.tab').forEach((t,i) =>
      t.classList.toggle('active', ['resumen','movimientos','inversiones'][i]===name));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById('tab-'+name).classList.add('active');
  }

  document.querySelectorAll('.modal-overlay').forEach(el =>
    el.addEventListener('click', e => { if (e.target===el) el.classList.remove('open'); })
  );

  cargarDatos();
  setInterval(cargarDatos, 60000);
</script>
</body>
</html>
